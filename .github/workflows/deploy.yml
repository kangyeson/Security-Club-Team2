name: Deploy to Server


on:
  push:
    branches: [ main ] # 메인 브랜치에 푸시될 때 실행

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: SSH Remote Commands
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          password: ${{ secrets.PASSWORD }}
          port: ${{ secrets.PORT }}
          script: |
            set -e # 이후 명령 실패 시 즉시 중단 + 액션 실패로 표시
            cd ~/Security-Club-Team2 # 서버 내 프로젝트 폴더로 이동
            git pull origin main # 최신 코드 가져오기
            docker-compose build backend # 백엔드 이미지만 새로 빌드
            docker-compose up -d --no-deps backend  # DB 건드리지 않고 백엔드 컨테이너만 교체