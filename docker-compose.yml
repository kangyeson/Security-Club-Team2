version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: community-db
    environment:
      POSTGRES_DB: community
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin1234
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d community"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: community-backend
    environment:
      DATABASE_URL: postgresql://admin:admin1234@db:5432/community
      SECRET_KEY: your-super-secret-key-change-in-production
      UPLOAD_DIR: /app/uploads
    ports:
      - "8000:8000"
    volumes:
      - ./backend/uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: community-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data:
