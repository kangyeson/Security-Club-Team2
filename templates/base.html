 <!-- 모든 페이지의 공통 뼈대, 내비게이션과 전체적인 레이아웃 담당 -->
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Security Lab{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/common.css') }}">
    {% block extra_css %}{% endblock %}
</head>
<body>
    <nav class="navbar">
        <div class="logo"><a href="/">Web Hacking Lab</a></div>
        <div class="nav-links">
            <a href="/login">로그인</a>
            <a href="/signup">회원가입</a>
        </div>
    </nav>

    <main class="container">
        {% block content %}{% endblock %}
    </main>

    <footer>
        <p>&copy; 2026 Security Club Team2</p>
    </footer>

    <script src="{{ url_for('static', filename='js/common.js') }}"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
