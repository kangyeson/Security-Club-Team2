{% extends "base.html" %}

{% block title %}회원가입 - Security Lab{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/auth.css') }}">
<style>
    /* 입력창과 중복확인 버튼을 나란히 배치하기 위한 추가 스타일 */
    .input-with-btn {
        display: flex;
        gap: 10px;
    }
    .input-with-btn input {
        flex: 1;
    }
    .validation-msg {
        font-size: 0.85em;
        margin-top: 5px;
        display: block;
    }
    .text-danger { color: #dc3545; }
    .text-success { color: #28a745; }
</style>
{% endblock %}

{% block content %}
<div class="auth-container">
    <h2>회원가입</h2>
    <form id="signupForm" method="POST" action="/signup" class="auth-form">

        <div class="form-group">
            <label for="user_id">아이디</label>
            <div class="input-with-btn">
                <input type="text" id="user_id" name="id" placeholder="영문, 숫자 4자 이상" required>
                <button type="button" id="btn_check_id" class="btn btn-secondary">중복확인</button>
            </div>
            <span id="id_msg" class="validation-msg"></span>
        </div>

        <div class="form-group">
            <label for="user_pw">비밀번호</label>
            <input type="password" id="user_pw" name="pw" placeholder="비밀번호를 입력하세요" required>
        </div>

        <div class="form-group">
            <label for="user_pw_confirm">비밀번호 확인</label>
            <input type="password" id="user_pw_confirm" placeholder="비밀번호를 다시 입력하세요" required>
            <span id="pw_msg" class="validation-msg"></span>
        </div>

        <div class="form-group">
            <label for="user_name">이름 (닉네임)</label>
            <input type="text" id="user_name" name="name" placeholder="이름을 입력하세요" required>
        </div>

        <div class="form-group">
            <label for="user_email">이메일</label>
            <input type="email" id="user_email" name="email" placeholder="test@example.com" required>
        </div>

        <button type="submit" class="btn btn-primary btn-block">가입하기</button>
    </form>

    <div class="auth-links">
        이미 계정이 있으신가요? <a href="/login">로그인</a>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script src="{{ url_for('static', filename='js/signup.js') }}"></script>
{% endblock %}
